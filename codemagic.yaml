workflows:
  android-capacitor-build:
    name: Glow Music APK Build
    max_build_duration: 10
    instance_type: mac_mini_m1
    environment:
      node: latest
    triggering:
      events:
        - push
    scripts:
      - name: Crear estructura base del proyecto automaticamente
        script: |
          if [ ! -f package.json ]; then
            echo "Generando esqueleto inicial para React y Capacitor..."
            npm init -y
            npm pkg set name="glow-music"
            npm pkg set version="1.0.0"
            npm pkg set scripts.build="echo 'Estructura Web OK'"
            mkdir -p dist
            echo '<html><head><title>Glow Music</title></head><body style="background:#121212;color:white;text-align:center;padding-top:50px;"><h1>Glow Music Cargando...</h1></body></html>' > dist/index.html
          fi
      - name: Instalar dependencias del proyecto
        script: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor-community/admob @capacitor-community/media @capacitor/toast @capacitor/app @capacitor/device
      - name: Configurar e Inicializar Android Nativo
        script: |
          npx cap add android
      - name: Sincronizar con entorno nativo Android
        script: |
          npx cap sync android
      - name: Compilar APK final de producción
        script: |
          cd android && ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk

