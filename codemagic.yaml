flujos de trabajo:
  compilación de condensadores de Android:
    nombre: Glow Music APK Build
    duración_máxima_de_construcción: 15
    tipo_de_instancia: mac_mini_m1
    ambiente:
      nodo: lts
      Java: 17
    desencadenante:
      eventos:
        - empujar
    guiones:
      - nombre: Crear estructura base del proyecto automáticamente
        guion: |
          if [ ! -f package.json ]; then
            echo "Generando esqueleto inicial para React y Capacitor..."
            npm init -y
            npm pkg set name="glow-music"
            npm pkg set version="1.0.0"
            npm pkg set scripts.build="echo 'Estructura Web OK'"
            mkdir -p dist
            echo '<html><head><title>Glow Music</title></head><body style="background:#121212;color:white;text-align:center;padding-top:50px;"><h1>Glow Music Iniciando...</h1></body></html>' > dist/index.html
          fi

      - nombre: Instalar dependencias del proyecto y generador de iconos
        guion: |
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest
          npm install @capacitor-community/admob@latest @capacitor-community/media@latest
          npm install @capacitor/toast@latest @capacitor/app@latest @capacitor/device@latest
          npm install -D @capacitor/assets

      - nombre: Inicializar y Configurar Capacitor Assets para el Icono de Glow
        guion: |
          mkdir -p assets
          # NOTA: Asegúrate de tener tu imagen 'logo_glow.png' en la raíz de tu repositorio.
          # Si no existe, este comando creará un icono temporal para evitar que falle la compilación.
          if [ ! -f assets/logo_glow.png ]; then
            echo "Icono personalizado no encontrado en assets/logo_glow.png. Usando respaldo."
            cp dist/index.html assets/icon-only.png || touch assets/icon-only.png
          else
            cp assets/logo_glow.png assets/icon-only.png
            cp assets/logo_glow.png assets/icon.png
            cp assets/logo_glow.png assets/splash.png
          fi

      - nombre: Configurar e Inicializar Android Nativo
        guion: |
          if [ ! -d "android" ]; then
            npx cap init "Glow Music" "com.glowmusic.app" --web-dir=dist
            npx cap add android
          fi

      - nombre: Generar e Inyectar Iconos de Glow en el Proyecto Android
        guion: |
          # Esto genera automáticamente todos los tamaños de iconos (mipmap) para Android
          npx capacitor-assets generate --android

      - nombre: Sincronizar y Reparar Permisos Android
        guion: |
          npx cap sync android
          # Corrige problemas comunes de permisos de Gradle en entornos CI/CD
          chmod +x android/gradlew

      - nombre: Compilar APK final de producción
        guion: |
          cd android && ./gradlew assembleDebug --no-daemon
          
    artefactos:
      - android/app/build/outputs/apk/debug/*.apk
