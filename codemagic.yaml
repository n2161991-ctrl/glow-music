workflows:
  android-capacitor-build:
    name: Glow Music APK Build
    max_build_duration: 15
    instance_type: mac_mini_m1
    environment:
      node: lts
      java: 17
    triggering:
      events:
        - push
    publishing:
      email:
        recipients:
          - n2161991@gmail.com
    scripts:
      - name: Ensamblar Entorno e Interfaz de Glow Music
        script: |
          echo "Generando configuracion package.json..."
          echo '{"name":"glow-music","version":"1.0.0","scripts":{"build":"echo OK"}}' > package.json

          mkdir -p dist
          
          echo "Generando interfaz visual del reproductor..."
          cat << 'EOF' > dist/index.html
          <!DOCTYPE html>
          <html lang="es">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
              <title>Glow Music</title>
              <style>
                  body {
                      margin: 0; padding: 0;
                      background: #0d0d13; color: #ffffff;
                      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                      display: flex; flex-direction: column;
                      justify-content: space-between; align-items: center;
                      height: 100vh; overflow: hidden; box-sizing: border-box;
                      padding: 40px 20px;
                  }
                  .top-section { text-align: center; width: 100%; margin-top: 20px; }
                  h1 { font-size: 2.2rem; margin: 10px 0 5px 0; color: #ffffff; font-weight: 700; }
                  p { color: #8a8a9d; font-size: 1rem; margin: 0; }
                  .neon-box {
                      width: 130px; height: 130px;
                      background: #000000;
                      border-radius: 30px;
                      margin: 0 auto 25px auto;
                      display: flex; justify-content: center; align-items: center;
                      box-shadow: 0 0 25px #ff007f, inset 0 0 15px rgba(255, 0, 127, 0.4);
                      border: 2px solid rgba(255, 0, 127, 0.6);
                  }
                  .neon-g {
                      font-size: 5rem; font-weight: 900; color: #ffffff;
                      text-shadow: 0 0 10px #ff007f, 0 0 20px #ff007f, 0 0 35px #ff007f;
                  }
                  .player-container {
                      width: 100%; max-width: 360px;
                      background: rgba(20, 20, 30, 0.6);
                      border: 1px solid rgba(255, 0, 127, 0.2);
                      border-radius: 30px;
                      padding: 25px; box-sizing: border-box;
                      text-align: center; backdrop-filter: blur(10px);
                  }
                  .song-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 4px; }
                  .song-artist { font-size: 0.9rem; color: #8a8a9d; margin-bottom: 25px; }
                  .controls { display: flex; justify-content: center; align-items: center; gap: 30px; }
                  .btn { background: none; border: none; color: #ffffff; cursor: pointer; }
                  .btn-nav svg { width: 24px; height: 24px; fill: currentColor; }
                  .btn-play { width: 64px; height: 64px; background: #ffffff; border-radius: 50%; color: #0d0d13; display: flex; align-items: center; justify-content: center; }
                  .btn-play svg { width: 28px; height: 28px; fill: currentColor; }
                  .status-container { font-size: 0.85rem; color: #00ff66; display: flex; align-items: center; }
                  .status-dot { width: 8px; height: 8px; background: #00ff66; border-radius: 50%; margin-right: 6px; box-shadow: 0 0 8px #00ff66; }
              </style>
          </head>
          <body>
              <div class="top-section">
                  <div class="neon-box"><div class="neon-g">G</div></div>
                  <h1>Glow Music</h1>
                  <p>reproductor de música</p>
              </div>
              <div class="player-container">
                  <div class="song-title">Siente el Ritmo</div>
                  <div class="song-artist">Glow Music Player</div>
                  <div class="controls">
                      <button class="btn btn-nav"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                      <button class="btn btn-play"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg></button>
                      <button class="btn btn-nav"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6zm9-12h2v12h-2z"/></svg></button>
                  </div>
              </div>
              <div class="status-container"><span class="status-dot"></span>Servicio Activo</div>
          </body>
          </html>
          EOF

          echo "Generando configuracion de Capacitor..."
          echo '{"appId":"com.glowmusic.app","appName":"Glow Music","webDir":"dist","bundledWebRuntime":false,"plugins":{"AdMob":{"androidAppId":"ca-app-pub-3940256099942544~3347511713"}}}' > capacitor.config.json

      - name: Instalar Modulos e Inyectar Plataforma Nativa Android
        script: |
          npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6
          npm install @capacitor-community/admob@6 @capacitor-community/media@6
          npm install @capacitor/toast@6 @capacitor/app@6 @capacitor/device@6
          npm install -D @capacitor/assets

          mkdir -p assets
          cp dist/index.html assets/icon-only.png
          cp dist/index.html assets/icon.png
          cp dist/index.html assets/splash.png

          rm -rf android
          npx cap add android
          npx capacitor-assets generate --android || echo "Assets listos"
          npx cap sync android
          chmod +x android/gradlew

      - name: Aplicar Parches de Compilacion del Dispositivo
        script: |
          mkdir -p android
          cat << 'EOF' > android/variables.gradle
          ext {
              minSdkVersion = 22
              compileSdkVersion = 35
              targetSdkVersion = 35
              androidxActivityVersion = '1.8.0'
              androidxAppCompatVersion = '1.6.1'
              androidxCoordinatorLayoutVersion = '1.2.0'
              androidxCoreVersion = '1.12.0'
              androidxFragmentVersion = '1.6.2'
              coreSplashScreenVersion = '1.0.1'
              androidxWebkitVersion = '1.9.0'
              firebaseMessagingVersion = '23.3.1'
              playServicesLocationVersion = '21.0.1'
              junitVersion = '4.13.2'
              androidxJunitVersion = '1.1.5'
              androidxEspressoCoreVersion = '3.5.1'
          }
          EOF

          cat << 'EOF' > patch_manifest.js
          const fs = require('fs');
          const file = 'android/app/src/main/AndroidManifest.xml';
          if (fs.existsSync(file)) {
              let content = fs.readFileSync(file, 'utf8');
              const adId = 'ca-app-pub-3940256099942544~3347511713';
              const metaData = '\n        <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="' + adId + '"/>';
              if (!content.includes('APPLICATION_ID')) {
                  content = content.replace('</activity>', '</activity>' + metaData);
              }
              const permissions = '\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.READ_MEDIA_AUDIO"/>';
              if (!content.includes('READ_EXTERNAL_STORAGE')) {
                  content = content.replace('<application', permissions + '\n    <application');
              }
              fs.writeFileSync(file, content, 'utf8');
              console.log('Manifiesto parchado correctamente.');
          }
          EOF
          node patch_manifest.js
          rm patch_manifest.js

      - name: Ejecutar Compilacion Final del APK
        script: |
          cd android
          ./gradlew assembleDebug --no-daemon -x lint -x test
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
